version = 1
revision = 3
requires-python = ">=3.13"

[manifest]
members = [
    "common",
    "experiments",
    "job-genie",
    "lighthouse-genie",
    "money-genie",
    "riva-agent",
    "workout-genie",
]

[[package]]
name = "common"
version = "0.1.0"
source = { editable = "common" }

[[package]]
name = "experiments"
version = "0.1.0"
source = { editable = "experiments" }

[[package]]
name = "job-genie"
version = "0.1.0"
source = { editable = "job-genie" }
dependencies = [
    { name = "common" },
]

[package.metadata]
requires-dist = [{ name = "common", editable = "common" }]

[[package]]
name = "lighthouse-genie"
version = "0.1.0"
source = { editable = "lighthouse-genie" }
dependencies = [
    { name = "common" },
]

[package.metadata]
requires-dist = [{ name = "common", editable = "common" }]

[[package]]
name = "money-genie"
version = "0.1.0"
source = { editable = "money-genie" }
dependencies = [
    { name = "common" },
]

[package.metadata]
requires-dist = [{ name = "common", editable = "common" }]

[[package]]
name = "riva-agent"
version = "0.1.0"
source = { virtual = "." }
dependencies = [
    { name = "common" },
    { name = "job-genie" },
    { name = "lighthouse-genie" },
    { name = "money-genie" },
    { name = "workout-genie" },
]

[package.metadata]
requires-dist = [
    { name = "common", editable = "common" },
    { name = "job-genie", editable = "job-genie" },
    { name = "lighthouse-genie", editable = "lighthouse-genie" },
    { name = "money-genie", editable = "money-genie" },
    { name = "workout-genie", editable = "workout-genie" },
]

[[package]]
name = "workout-genie"
version = "0.1.0"
source = { editable = "workout-genie" }
dependencies = [
    { name = "common" },
]

[package.metadata]
requires-dist = [{ name = "common", editable = "common" }]
